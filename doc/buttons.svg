<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="14" fill="#666">Templates.Partials.Buttons</text>

  <!-- primaryButton -->
  <rect x="30" y="45" width="160" height="45" rx="12" fill="#00B9DA" filter="url(#shadow)"/>
  <text x="110" y="73" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Submit</text>
  <text x="110" y="105" text-anchor="middle" font-size="10" fill="#888">primaryButton</text>

  <!-- primaryButton hover -->
  <rect x="220" y="45" width="160" height="45" rx="12" fill="#0099B8" filter="url(#shadow)" transform="scale(1.05)" transform-origin="300 67"/>
  <text x="300" y="73" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Submit</text>
  <text x="300" y="105" text-anchor="middle" font-size="10" fill="#888">hover state</text>

  <!-- navyBlueButton -->
  <rect x="410" y="45" width="160" height="45" rx="12" fill="#2E3A59" filter="url(#shadow)"/>
  <text x="490" y="73" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Continue</text>
  <text x="490" y="105" text-anchor="middle" font-size="10" fill="#888">navyBlueButton</text>

  <!-- secondaryButton -->
  <rect x="30" y="125" width="160" height="40" rx="6" fill="#EEF4FF" stroke="#D0D5DD" stroke-width="1"/>
  <text x="110" y="150" text-anchor="middle" font-size="13" fill="#2E3A59" font-weight="bold">Cancel</text>
  <text x="110" y="180" text-anchor="middle" font-size="10" fill="#888">secondaryButton</text>

  <!-- iconButton -->
  <rect x="220" y="125" width="45" height="40" rx="6" fill="#00B9DA" filter="url(#shadow)"/>
  <text x="242" y="151" text-anchor="middle" font-size="18" fill="white">&#9654;</text>
  <text x="242" y="180" text-anchor="middle" font-size="10" fill="#888">iconButton</text>

  <!-- secondaryIconButton -->
  <rect x="295" y="125" width="45" height="40" rx="6" fill="#EEF4FF" stroke="#D0D5DD" stroke-width="1"/>
  <text x="317" y="151" text-anchor="middle" font-size="18" fill="#2E3A59">&#9998;</text>
  <text x="317" y="180" text-anchor="middle" font-size="10" fill="#888">secondaryIconButton</text>

  <!-- primaryButtonImage -->
  <rect x="370" y="125" width="200" height="60" rx="12" fill="#00B9DA" filter="url(#shadow)"/>
  <rect x="440" y="133" width="60" height="30" rx="4" fill="rgba(255,255,255,0.3)"/>
  <text x="470" y="153" text-anchor="middle" font-size="10" fill="white">[ img ]</text>
  <text x="470" y="175" text-anchor="middle" font-size="11" fill="white">Label</text>
  <text x="470" y="202" text-anchor="middle" font-size="10" fill="#888">primaryButtonImageText</text>

  <!-- buttonToggleBody -->
  <g transform="translate(30, 215)">
    <rect width="160" height="40" rx="6" fill="#F0F0F0" stroke="#CCC" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" font-size="13" fill="#333">Toggle: ON</text>
    <text x="80" y="58" text-anchor="middle" font-size="10" fill="#888">buttonToggleBody</text>
  </g>

  <!-- greedyButton -->
  <g transform="translate(220, 215)">
    <rect width="160" height="40" rx="6" fill="#F8F8F8" stroke="#AAA" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="80" y="25" text-anchor="middle" font-size="13" fill="#555">Stop Propagation</text>
    <text x="80" y="58" text-anchor="middle" font-size="10" fill="#888">greedyButton</text>
  </g>

  <!-- primaryButtonSized -->
  <g transform="translate(410, 215)">
    <rect width="100" height="35" rx="12" fill="#00B9DA" filter="url(#shadow)"/>
    <text x="50" y="23" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Sized</text>
    <text x="50" y="55" text-anchor="middle" font-size="10" fill="#888">primaryButtonSized</text>
    <text x="130" y="20" font-size="9" fill="#AAA">h=TWSize</text>
    <text x="130" y="32" font-size="9" fill="#AAA">w=TWSize</text>
  </g>

  <!-- Legend -->
  <text x="300" y="330" text-anchor="middle" font-size="10" fill="#AAA">All buttons return Event t () on click</text>
</svg>
