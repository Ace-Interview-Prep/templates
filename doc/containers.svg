<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 200" font-family="sans-serif">
  <text x="275" y="20" text-anchor="middle" font-size="14" fill="#666">Templates.Partials.Containers</text>

  <!-- Expanded state -->
  <g transform="translate(20, 35)">
    <rect width="220" height="140" rx="6" fill="#1A1A2E" stroke="#333" stroke-width="1"/>
    <!-- Header -->
    <rect width="220" height="35" rx="6" fill="#252540"/>
    <text x="15" y="23" font-size="13" fill="white">Settings</text>
    <text x="195" y="24" font-size="16" fill="white">&#9650;</text>
    <!-- Body content -->
    <rect x="10" y="45" width="200" height="80" rx="4" fill="#2A2A45" opacity="0.5"/>
    <text x="110" y="90" text-anchor="middle" font-size="11" fill="#AAA">body content</text>
    <text x="110" y="155" text-anchor="middle" font-size="10" fill="#888">expanded (toggled = True)</text>
  </g>

  <!-- Arrow -->
  <text x="270" y="110" text-anchor="middle" font-size="14" fill="#AAA">click</text>
  <text x="270" y="125" text-anchor="middle" font-size="14" fill="#AAA">&#8596;</text>

  <!-- Collapsed state -->
  <g transform="translate(310, 35)">
    <rect width="220" height="35" rx="6" fill="#252540" stroke="#333" stroke-width="1"/>
    <text x="15" y="23" font-size="13" fill="white">Settings</text>
    <text x="195" y="24" font-size="16" fill="white" transform="rotate(180,195,18)">&#9650;</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#888">collapsed (toggled = False)</text>
    <text x="110" y="75" text-anchor="middle" font-size="9" fill="#AAA">body hidden or not rendered</text>
  </g>

  <!-- Variants -->
  <text x="360" y="120" font-size="10" fill="#555">collapsibleContainer  -- body hidden via CSS</text>
  <text x="360" y="135" font-size="10" fill="#555">collapsibleContainer_ -- body not rendered</text>
  <text x="360" y="150" font-size="10" fill="#555">collapsibleContainerWithImage -- has icon</text>
</svg>
