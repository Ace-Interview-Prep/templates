<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" font-family="sans-serif">
  <text x="200" y="20" text-anchor="middle" font-size="14" fill="#666">Templates.Partials.Checkbox</text>

  <!-- Unchecked -->
  <rect x="60" y="40" width="22" height="22" rx="3" fill="white" stroke="#D0D5DD" stroke-width="2"/>
  <text x="71" y="82" text-anchor="middle" font-size="11" fill="#888">unchecked</text>

  <!-- Arrow -->
  <text x="130" y="56" text-anchor="middle" font-size="16" fill="#AAA">click &#8594;</text>

  <!-- Checked -->
  <rect x="190" y="40" width="22" height="22" rx="3" fill="#00B9DA" stroke="#00B9DA" stroke-width="2"/>
  <polyline points="195,52 199,57 207,46" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="201" y="82" text-anchor="middle" font-size="11" fill="#888">checked</text>

  <!-- API note -->
  <text x="300" y="48" font-size="10" fill="#555">_checkbox_value :: Dynamic t Bool</text>
  <text x="300" y="62" font-size="10" fill="#555">_checkbox_change :: Event t Bool</text>
  <text x="300" y="80" font-size="10" fill="#888">HasValue instance</text>
</svg>
