<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" font-family="sans-serif">
  <text x="250" y="20" text-anchor="middle" font-size="14" fill="#666">Templates.Partials.Errors</text>

  <!-- errorMessage -->
  <g transform="translate(30, 40)">
    <rect width="180" height="30" rx="4" fill="#FEF2F2"/>
    <text x="15" y="20" font-size="12" fill="rgba(220,38,38,0.7)">Invalid email format</text>
    <text x="90" y="50" text-anchor="middle" font-size="10" fill="#888">errorMessage</text>
  </g>

  <!-- eitherDisplay flow -->
  <g transform="translate(250, 35)">
    <text x="0" y="5" font-size="11" fill="#555" font-weight="bold">eitherDisplay</text>
    <rect x="0" y="15" width="80" height="25" rx="4" fill="#E8F7FA" stroke="#00B9DA" stroke-width="1"/>
    <text x="40" y="33" text-anchor="middle" font-size="10" fill="#2E3A59">Right a</text>
    <text x="95" y="32" font-size="12" fill="#AAA">&#8594; template a</text>

    <rect x="0" y="48" width="80" height="25" rx="4" fill="#FEF2F2" stroke="#DC2626" stroke-width="1"/>
    <text x="40" y="66" text-anchor="middle" font-size="10" fill="#DC2626">Left e</text>
    <text x="95" y="65" font-size="12" fill="#AAA">&#8594; failtemplate e</text>
  </g>

  <!-- maybeDisplay flow -->
  <g transform="translate(250, 100)">
    <text x="0" y="5" font-size="11" fill="#555" font-weight="bold">maybeDisplay / displayOn</text>
    <rect x="0" y="15" width="80" height="25" rx="4" fill="#E8F7FA" stroke="#00B9DA" stroke-width="1"/>
    <text x="40" y="33" text-anchor="middle" font-size="10" fill="#2E3A59">Just a</text>
    <text x="95" y="32" font-size="12" fill="#AAA">&#8594; template a</text>

    <rect x="160" y="15" width="80" height="25" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
    <text x="200" y="33" text-anchor="middle" font-size="10" fill="#AAA">Nothing</text>
    <text x="255" y="32" font-size="12" fill="#AAA">&#8594; blank</text>
  </g>
</svg>
